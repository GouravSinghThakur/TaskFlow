{% extends "base.html" %}
{% block title %}Projects — TaskFlow{% endblock %}

{% block content %}
<div class="fade-in">

  
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Projects</h1>
      <p class="text-slate-500 text-sm mt-0.5">Manage your team projects</p>
    </div>
    <button id="btn-new-project" onclick="openModal()"
            class="hidden bg-brand hover:bg-brand-dark text-white text-sm font-medium px-4 py-2 rounded-lg transition">
      + New Project
    </button>
  </div>

  
  <div id="projects-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="col-span-full text-center py-16 text-slate-400">
      <div class="text-4xl mb-3">📁</div>
      <p class="text-sm">Loading projects…</p>
    </div>
  </div>

</div>


<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-7 fade-in">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-slate-800">Create Project</h2>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
    </div>

    <form id="project-form" novalidate>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Project name <span class="text-red-400">*</span></label>
        <input id="p-name" type="text" required placeholder="e.g. Website Redesign"
               class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300
                      focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm transition" />
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
        <textarea id="p-desc" rows="3" placeholder="Optional description…"
                  class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300
                         focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand
                         text-sm transition resize-none"></textarea>
      </div>
      <div id="p-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>
      <div class="flex gap-3">
        <button type="button" onclick="closeModal()"
                class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-lg text-sm transition">
          Cancel
        </button>
        <button id="p-submit" type="submit"
                class="flex-1 bg-brand hover:bg-brand-dark text-white font-semibold py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2">
          <span>Create</span>
          <svg id="p-spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (!requireAuth()) { /* redirected */ }

  if (isAdmin()) {
    document.getElementById('btn-new-project').classList.remove('hidden');
  }

  function openModal()  { document.getElementById('modal').classList.remove('hidden'); }
  function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  const statusBadge = s => {
    const map = {
      TODO:        ['bg-slate-100 text-slate-600', 'To Do'],
      IN_PROGRESS: ['bg-blue-100 text-blue-700',   'In Progress'],
      DONE:        ['bg-emerald-100 text-emerald-700', 'Done'],
    };
    const [cls, label] = map[s] || ['bg-slate-100 text-slate-600', s];
    return `<span class="px-2 py-0.5 text-xs rounded-full font-medium ${cls}">${label}</span>`;
  };

  function renderProjects(projects) {
    const el = document.getElementById('projects-list');
    if (!projects.length) {
      const createBtnHtml = isAdmin() 
        ? `<button onclick="openModal()" class="mt-3 text-brand hover:underline text-sm font-medium">Create your first project →</button>`
        : '';
      el.innerHTML = `
        <div class="col-span-full text-center py-16 text-slate-400">
          <div class="text-4xl mb-3">📁</div>
          <p class="text-sm">No projects yet.</p>
          ${createBtnHtml}
        </div>`;
      return;
    }
    el.innerHTML = projects.map(p => `
      <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm hover:shadow-md transition group">
        <div class="flex items-start justify-between gap-2 mb-2">
          <h3 class="font-semibold text-slate-800 group-hover:text-brand transition truncate">${escHtml(p.name)}</h3>
          <span class="text-xs text-slate-400 whitespace-nowrap">#${p.id}</span>
        </div>
        <p class="text-sm text-slate-500 mb-4 line-clamp-2 min-h-[2.5rem]">
          ${p.description ? escHtml(p.description) : '<span class="italic">No description</span>'}
        </p>
        <div class="flex items-center justify-between mt-auto">
          <span class="text-xs text-slate-400">By ${escHtml(p.creator?.name ?? 'Unknown')}</span>
          <a href="/ui/tasks?project_id=${p.id}"
             class="text-xs text-brand hover:underline font-medium">View tasks →</a>
        </div>
      </div>`).join('');
  }

  async function loadProjects() {
    try {
      const data = await api('GET', '/api/projects?limit=100');
      renderProjects(data.projects);
    } catch (err) {
      flash(err.message, 'error');
    }
  }

  document.getElementById('project-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn     = document.getElementById('p-submit');
    const spinner = document.getElementById('p-spinner');
    const errEl   = document.getElementById('p-error');
    const name    = document.getElementById('p-name').value.trim();
    const desc    = document.getElementById('p-desc').value.trim();

    errEl.classList.add('hidden');
    if (!name) { errEl.textContent = 'Project name is required.'; errEl.classList.remove('hidden'); return; }

    btn.disabled = true; spinner.classList.remove('hidden');
    try {
      await api('POST', '/api/projects', { name, description: desc || null });
      flash('Project created!');
      closeModal();
      document.getElementById('p-name').value = '';
      document.getElementById('p-desc').value = '';
      loadProjects();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false; spinner.classList.add('hidden');
    }
  });

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadProjects();
</script>
{% endblock %}
