{% extends "base.html" %}
{% block title %}Tasks — TaskFlow{% endblock %}

{% block content %}
<div class="fade-in">

  
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800" id="page-title">Tasks</h1>
      <p class="text-slate-500 text-sm mt-0.5" id="page-sub">Loading…</p>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      
      <select id="project-select"
              class="text-sm border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand transition">
        <option value="">My assigned tasks</option>
      </select>
      
      <select id="status-filter"
              class="text-sm border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand transition">
        <option value="">All statuses</option>
        <option value="TODO">To Do</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="DONE">Done</option>
      </select>
      <button id="btn-new-task" onclick="openCreateModal()" class="hidden bg-brand hover:bg-brand-dark text-white text-sm font-medium px-4 py-2 rounded-lg transition">
        + New Task
      </button>
    </div>
  </div>

  
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-slate-500 uppercase text-xs tracking-wide border-b border-slate-200">
        <tr>
          <th class="px-5 py-3 text-left">Title</th>
          <th class="px-4 py-3 text-left hidden md:table-cell">Priority</th>
          <th class="px-4 py-3 text-left">Status</th>
          <th class="px-4 py-3 text-left hidden lg:table-cell">Due date</th>
          <th class="px-4 py-3 text-left hidden md:table-cell">Assignee</th>
          <th class="px-4 py-3 text-left">Actions</th>
        </tr>
      </thead>
      <tbody id="task-rows">
        <tr><td colspan="6" class="py-16 text-center text-slate-400">Loading tasks…</td></tr>
      </tbody>
    </table>
    <div id="task-count" class="text-xs text-slate-400 px-5 py-2 border-t border-slate-100"></div>
  </div>

</div>


<div id="create-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-7 fade-in max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-slate-800">Create Task</h2>
      <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <form id="create-form" novalidate>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Title <span class="text-red-400">*</span></label>
        <input id="t-title" type="text" required placeholder="Task title"
               class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm transition" />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
        <textarea id="t-desc" rows="2" placeholder="Optional…"
                  class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm transition resize-none"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Priority</label>
          <select id="t-priority" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-brand/40 text-sm transition">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Due date</label>
          <input id="t-due" type="date"
                 class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-brand/40 text-sm transition" />
        </div>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Assign to (User ID)</label>
        <input id="t-assign" type="number" min="1" placeholder="Leave blank to leave unassigned"
               class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-brand/40 text-sm transition" />
      </div>
      <div id="ct-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>
      <div class="flex gap-3">
        <button type="button" onclick="closeCreateModal()"
                class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-lg text-sm transition">Cancel</button>
        <button id="ct-submit" type="submit"
                class="flex-1 bg-brand hover:bg-brand-dark text-white font-semibold py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2">
          <span>Create task</span>
          <svg id="ct-spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </div>
    </form>
  </div>
</div>


<div id="status-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 p-7 fade-in">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-slate-800">Update Status</h2>
      <button onclick="closeStatusModal()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <p id="status-task-title" class="text-sm text-slate-600 mb-4 font-medium"></p>
    <form id="status-form">
      <input id="status-task-id" type="hidden" />
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">New status</label>
        <select id="new-status"
                class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-brand/40 text-sm transition">
          <option value="TODO">To Do</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="DONE">Done</option>
        </select>
      </div>
      <div id="st-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>
      <div class="flex gap-3">
        <button type="button" onclick="closeStatusModal()"
                class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-lg text-sm transition">Cancel</button>
        <button id="st-submit" type="submit"
                class="flex-1 bg-brand hover:bg-brand-dark text-white font-semibold py-2.5 rounded-lg text-sm transition">Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (!requireAuth()) { /* redirected */ }

  const me = getUser();
  let currentProjectId = null;

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const PRIORITY_CLS = {
    High:   'bg-red-100 text-red-700',
    Medium: 'bg-amber-100 text-amber-700',
    Low:    'bg-slate-100 text-slate-600',
  };
  const STATUS_MAP = {
    TODO:        ['bg-slate-100 text-slate-600',      'To Do'],
    IN_PROGRESS: ['bg-blue-100 text-blue-700',        'In Progress'],
    DONE:        ['bg-emerald-100 text-emerald-700',  'Done'],
  };

  function priorityBadge(p) {
    return `<span class="px-2 py-0.5 text-xs rounded-full font-medium ${PRIORITY_CLS[p]||'bg-slate-100 text-slate-600'}">${escHtml(p)}</span>`;
  }
  function statusBadge(s) {
    const [cls, label] = STATUS_MAP[s] || ['bg-slate-100 text-slate-600', s];
    return `<span class="px-2 py-0.5 text-xs rounded-full font-medium ${cls}">${label}</span>`;
  }
  function formatDate(d) {
    if (!d) return '<span class="text-slate-300">—</span>';
    const dt = new Date(d);
    const now = new Date();
    const overdue = dt < now;
    return `<span class="${overdue ? 'text-red-500 font-medium' : 'text-slate-600'}">${dt.toLocaleDateString()}</span>`;
  }

  function renderTasks(tasks) {
    const tbody = document.getElementById('task-rows');
    const count = document.getElementById('task-count');
    if (!tasks.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="py-16 text-center text-slate-400">
        <div class="text-3xl mb-2">✅</div><p class="text-sm">No tasks found.</p></td></tr>`;
      count.textContent = '';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr class="border-t border-slate-100 hover:bg-slate-50 transition">
        <td class="px-5 py-3 font-medium text-slate-800 max-w-[200px] truncate">${escHtml(t.title)}</td>
        <td class="px-4 py-3 hidden md:table-cell">${priorityBadge(t.priority)}</td>
        <td class="px-4 py-3">${statusBadge(t.status)}</td>
        <td class="px-4 py-3 hidden lg:table-cell text-sm">${formatDate(t.due_date)}</td>
        <td class="px-4 py-3 hidden md:table-cell text-sm text-slate-500">
          ${t.assignee ? escHtml(t.assignee.name) : '<span class="text-slate-300">Unassigned</span>'}
        </td>
        <td class="px-4 py-3">
          <button onclick='openStatusModal(${t.id}, ${JSON.stringify(t.title)}, ${JSON.stringify(t.status)})'
                  class="text-xs text-brand hover:underline font-medium">
            Update status
          </button>
        </td>
      </tr>`).join('');
    count.textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;
  }

  async function loadTasks() {
    const statusFilter = document.getElementById('status-filter').value;
    try {
      let tasks;
      if (currentProjectId) {
        let url = `/api/tasks/project/${currentProjectId}?limit=100`;
        if (statusFilter) url += `&status=${statusFilter}`;
        const data = await api('GET', url);
        tasks = data.tasks;
        document.getElementById('page-sub').textContent = `Tasks in project #${currentProjectId}`;
        document.getElementById('btn-new-task').classList.remove('hidden');
      } else {
        const data = await api('GET', '/api/tasks/user/assigned?limit=100');
        tasks = data.tasks;
        if (statusFilter) tasks = tasks.filter(t => t.status === statusFilter);
        document.getElementById('page-sub').textContent = 'Tasks assigned to you';
        document.getElementById('btn-new-task').classList.add('hidden');
      }
      renderTasks(tasks);
    } catch (err) {
      flash(err.message, 'error');
    }
  }

  async function loadProjectSelector() {
    try {
      const data = await api('GET', '/api/projects?limit=100&mine_only=true');
      const sel = document.getElementById('project-select');
      data.projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    } catch (_) {}
  }

  document.getElementById('project-select').addEventListener('change', function() {
    currentProjectId = this.value || null;
    loadTasks();
  });
  document.getElementById('status-filter').addEventListener('change', loadTasks);

  function openCreateModal()  { document.getElementById('create-modal').classList.remove('hidden'); }
  function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }
  document.getElementById('create-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('create-modal')) closeCreateModal();
  });

  document.getElementById('create-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn     = document.getElementById('ct-submit');
    const spinner = document.getElementById('ct-spinner');
    const errEl   = document.getElementById('ct-error');
    errEl.classList.add('hidden');

    const title  = document.getElementById('t-title').value.trim();
    const desc   = document.getElementById('t-desc').value.trim();
    const prio   = document.getElementById('t-priority').value;
    const due    = document.getElementById('t-due').value;
    const assign = document.getElementById('t-assign').value;

    if (!title) { errEl.textContent = 'Title is required.'; errEl.classList.remove('hidden'); return; }
    if (!currentProjectId) { errEl.textContent = 'Select a project first.'; errEl.classList.remove('hidden'); return; }

    btn.disabled = true; spinner.classList.remove('hidden');
    try {
      const body = {
        title,
        description: desc || null,
        project_id: parseInt(currentProjectId),
        priority: prio,
        assigned_to: assign ? parseInt(assign) : null,
        due_date: due ? new Date(due).toISOString() : null,
      };
      await api('POST', '/api/tasks', body);
      flash('Task created!');
      closeCreateModal();
      document.getElementById('create-form').reset();
      loadTasks();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false; spinner.classList.add('hidden');
    }
  });

  function openStatusModal(id, title, currentStatus) {
    document.getElementById('status-task-id').value   = id;
    document.getElementById('status-task-title').textContent = title;
    document.getElementById('new-status').value        = currentStatus;
    document.getElementById('st-error').classList.add('hidden');
    document.getElementById('status-modal').classList.remove('hidden');
  }
  function closeStatusModal() { document.getElementById('status-modal').classList.add('hidden'); }
  document.getElementById('status-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('status-modal')) closeStatusModal();
  });

  document.getElementById('status-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('st-submit');
    const errEl = document.getElementById('st-error');
    const id     = document.getElementById('status-task-id').value;
    const status = document.getElementById('new-status').value;

    errEl.classList.add('hidden');
    btn.disabled = true;
    try {
      await api('PATCH', `/api/tasks/${id}`, { status });
      flash('Status updated!');
      closeStatusModal();
      loadTasks();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false;
    }
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get('project_id')) {
    currentProjectId = params.get('project_id');
    document.getElementById('project-select').value = currentProjectId;
    document.getElementById('btn-new-task').classList.remove('hidden');
  }

  loadProjectSelector();
  loadTasks();
</script>
{% endblock %}
