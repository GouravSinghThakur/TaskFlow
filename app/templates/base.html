<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Team Task Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5', light: '#a5b4fc' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] {
      display: none !important;
    }

    .fade-in {
      animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

  
  <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/ui/dashboard" class="flex items-center gap-2 font-bold text-brand text-lg tracking-tight">
        <span class="text-2xl">📋</span> TaskFlow
      </a>
      <div id="nav-links" class="hidden md:flex items-center gap-1 text-sm font-medium">
        <a href="/ui/dashboard" class="nav-link px-3 py-1.5 rounded-md hover:bg-slate-100 transition">Dashboard</a>
        <a href="/ui/projects" class="nav-link px-3 py-1.5 rounded-md hover:bg-slate-100 transition">Projects</a>
        <a href="/ui/tasks" class="nav-link px-3 py-1.5 rounded-md hover:bg-slate-100 transition">My Tasks</a>
        
        <a id="nav-apidocs" href="/docs" target="_blank"
          class="hidden nav-link px-3 py-1.5 rounded-md hover:bg-slate-100 transition text-violet-700">API Docs ↗</a>
      </div>
      <div class="flex items-center gap-2 text-sm">
        
        <span id="nav-role" class="hidden px-2 py-0.5 rounded-full text-xs font-semibold tracking-wide"></span>
        
        <span id="nav-user" class="text-slate-600 font-medium hidden"></span>
        <button id="btn-logout" onclick="logout()"
          class="hidden bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-md transition font-medium">
          Log out
        </button>
        <a id="btn-login" href="/ui/login"
          class="bg-brand hover:bg-brand-dark text-white px-3 py-1.5 rounded-md transition font-medium">
          Log in
        </a>
      </div>
    </div>
  </nav>

  
  <div id="flash"
    class="hidden fixed top-16 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg shadow-lg text-sm font-medium fade-in">
  </div>

  
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  
  <script>

    const getToken = () => localStorage.getItem('access_token');
    const getUser = () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } };
    const setAuth = (token, user) => { localStorage.setItem('access_token', token); localStorage.setItem('user', JSON.stringify(user)); };
    const clearAuth = () => { localStorage.removeItem('access_token'); localStorage.removeItem('user'); };

    const authHeaders = () => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${getToken()}`
    });

    let _flashTimer;
    function flash(msg, type = 'success') {
      const el = document.getElementById('flash');
      el.textContent = msg;
      el.className = `fixed top-16 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg shadow-lg text-sm font-medium fade-in ${type === 'error' ? 'bg-red-500 text-white' :
        type === 'warning' ? 'bg-amber-400 text-slate-900' :
          'bg-emerald-500 text-white'
        }`;
      clearTimeout(_flashTimer);
      _flashTimer = setTimeout(() => el.classList.add('hidden'), 3500);
    }

    const isAdmin = () => { const u = getUser(); return u && u.role === 'admin'; };
    const isMember = () => { const u = getUser(); return u && (u.role === 'member' || u.role === 'admin'); };

    function updateNav() {
      const token = getToken();
      const user = getUser();

      document.getElementById('btn-logout').classList.toggle('hidden', !token);
      document.getElementById('btn-login').classList.toggle('hidden', !!token);

      const navUser = document.getElementById('nav-user');
      const navRole = document.getElementById('nav-role');

      if (token && user) {

        navUser.textContent = '\u{1F464} ' + user.name;
        navUser.classList.remove('hidden');

        const role = (user.role || 'member').toLowerCase();
        if (role === 'admin') {
          navRole.textContent = 'Admin';
          navRole.className = 'px-2 py-0.5 rounded-full text-xs font-semibold tracking-wide bg-violet-100 text-violet-700 border border-violet-200';

          document.getElementById('nav-apidocs').classList.remove('hidden');
        } else {
          navRole.textContent = 'Member';
          navRole.className = 'px-2 py-0.5 rounded-full text-xs font-semibold tracking-wide bg-slate-100 text-slate-500 border border-slate-200';

          document.getElementById('nav-apidocs').classList.add('hidden');
        }
        navRole.classList.remove('hidden');
      } else {
        navUser.classList.add('hidden');
        navRole.classList.add('hidden');
      }
    }

    async function refreshUser() {
      if (!getToken()) return;
      try {
        const fresh = await api('GET', '/api/auth/me');
        const stored = getUser();
        setAuth(getToken(), { ...stored, ...fresh });
        updateNav();
      } catch (_) { /* silently ignore — token may be expired */ }
    }

    function logout() {
      clearAuth();
      window.location.href = '/ui/login';
    }

    function requireAuth() {
      if (!getToken()) { window.location.href = '/ui/login'; return false; }
      return true;
    }

    function redirectIfAuthed() {
      if (getToken()) window.location.href = '/ui/dashboard';
    }

    async function api(method, url, body = null) {
      const opts = { method, headers: authHeaders() };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
      return data;
    }

    updateNav();
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
