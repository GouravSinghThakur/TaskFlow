{% extends "base.html" %}
{% block title %}Log In — TaskFlow{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-md fade-in">

    <div class="text-center mb-8">
      <div class="text-5xl mb-3">📋</div>
      <h1 class="text-2xl font-bold text-slate-800">Welcome back</h1>
      <p class="text-slate-500 mt-1 text-sm">Sign in to your TaskFlow account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form id="login-form" novalidate>

        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
          <input id="email" type="email" name="email" required autocomplete="email"
                 placeholder="you@example.com"
                 class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300
                        focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand
                        text-sm transition" />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input id="password" type="password" name="password" required autocomplete="current-password"
                 placeholder="••••••••"
                 class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300
                        focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand
                        text-sm transition" />
        </div>

        <button id="btn-submit" type="submit"
                class="w-full bg-brand hover:bg-brand-dark text-white font-semibold
                       py-2.5 rounded-lg transition text-sm flex items-center justify-center gap-2">
          <span id="btn-text">Sign in</span>
          <svg id="spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>

        <div id="error-msg" class="hidden mt-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>

      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-5">
      Don't have an account?
      <a href="/ui/signup" class="text-brand hover:underline font-medium">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  redirectIfAuthed();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('btn-submit');
    const spinner  = document.getElementById('spinner');
    const errorEl  = document.getElementById('error-msg');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorEl.classList.add('hidden');
    btn.disabled = true;
    spinner.classList.remove('hidden');

    try {
      const params = new URLSearchParams();
      params.append('username', email);
      params.append('password', password);

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        let errMsg = `HTTP ${res.status}`;
        if (typeof data.detail === 'string') {
          errMsg = data.detail;
        } else if (Array.isArray(data.detail)) {
          errMsg = data.detail.map(e => e.msg).join(', ');
        } else if (data.detail) {
          errMsg = JSON.stringify(data.detail);
        }
        throw new Error(errMsg);
      }

      setAuth(data.access_token, data.user);
      flash('Logged in successfully!');
      window.location.href = '/ui/dashboard';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
    }
  });
</script>
{% endblock %}
